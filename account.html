<html lang="en">
<head>

<!-- Refined Title Tag -->
<title>My Account | NextGrid Technologies</title>

<!-- Refined Meta Description -->
<meta name="description" content="Manage your NextGrid Technologies account details, Microsoft 365 protection, and IT support settings.">

<meta name="keywords" content="account settings, profile, Microsoft 365, IT support">
<meta name="author" content="NextGrid Technologies">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<!-- Your standard header content (copy the exact HTML from your main site's header here) -->
<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">NextGrid Technologies</a>
    </div>
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <!-- Add any other main navigation links here -->
      <a href="account.html" class="nav-cta">My Account</a> <!-- Highlight My Account when active -->
    </nav>
    <button class="hamburger" id="hamburger">&#9776;</button>
  </div>
</header>

<section id="my-account" class="contact-wrapper account-wrapper" style="max-width:550px;margin:80px auto;">
  <h2>My Account</h2>
  
  <div class="account-info">
    <p><strong>Name:</strong> <span id="accountName">Loading...</span></p>
    <p><strong>Company:</strong> <span id="accountCompany">Loading...</span></p>
    <p><strong>Your Request:</strong> <span id="accountNeed">Loading...</span></p>
    <p><strong>Information:</strong> <span id="accountInformation">Loading...</span></p> <!-- New display field -->
    <p><strong>Email:</strong> <span id="accountEmail">Loading...</span></p>
  </div>

  <div class="update-profile-form">
    <h3>Update Your Information</h3>
    <form id="updateProfileForm">
      <label for="updateName">Name:</label>
      <input type="text" id="updateName" placeholder="Your Name">

      <label for="updateCompany">Company:</label>
      <input type="text" id="updateCompany" placeholder="Your Company">
      
      <label for="updateInformation">Information:</label> <!-- New input field -->
      <textarea id="updateInformation" placeholder="Any additional information"></textarea>
      
      <button type="submit" class="btn-primary">Save Changes</button>
      <p id="updateMessage" class="message-text"></p>
    </form>
    <button id="signOutButton" class="btn-secondary" style="margin-top: 20px;">Sign Out</button>
  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://tirkqybcedxfusifslim.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
);

// Function to fetch and display user data
async function fetchUserData(user) {
  if (!user) {
    return;
  }

  // Fetch profile row from 'profiles' table
  const { data: profile, error: profileError } = await supabaseClient
    .from('profiles')
    .select('full_name, company, need, information') // Fetch 'information' column
    .eq('id', user.id)
    .single();

  if (profileError) {
    console.error('Error fetching profile:', profileError.message);
    document.getElementById('accountName').textContent = user.user_metadata.full_name || 'N/A';
    document.getElementById('accountCompany').textContent = user.user_metadata.company || 'N/A';
    document.getElementById('accountNeed').textContent = 'N/A';
    document.getElementById('accountInformation').textContent = 'N/A'; // Default for new field
  } else {
    document.getElementById('accountName').textContent = profile.full_name || user.user_metadata.full_name || 'N/A';
    document.getElementById('accountCompany').textContent = profile.company || user.user_metadata.company || 'N/A';
    document.getElementById('accountNeed').textContent = profile.need || 'N/A';
    document.getElementById('accountInformation').textContent = profile.information || 'N/A'; // Display new field
  }
  
  document.getElementById('accountEmail').textContent = user.email;

  // Pre-fill update form with current data
  document.getElementById('updateName').value = profile?.full_name || user.user_metadata.full_name || '';
  document.getElementById('updateCompany').value = profile?.company || user.user_metadata.company || '';
  document.getElementById('updateInformation').value = profile?.information || ''; // Pre-fill new input
}

// Handle profile update form submission
document.getElementById('updateProfileForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const updateName = document.getElementById('updateName').value;
  const updateCompany = document.getElementById('updateCompany').value;
  const updateInformation = document.getElementById('updateInformation').value; // Get new field value
  const updateMessage = document.getElementById('updateMessage');
  const { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    updateMessage.textContent = 'You must be logged in to update your profile.';
    updateMessage.classList.add('error');
    return;
  }

  updateMessage.textContent = 'Saving changes...';
  updateMessage.className = 'message-text warning';

  // Update both auth.users (user_metadata) and the 'profiles' table
  // For user_metadata update (e.g., full_name if you also store it there)
  const { error: authError } = await supabaseClient.auth.updateUser({
    data: {
      full_name: updateName // Assuming 'full_name' is a user_metadata field
    }
  });

  // For 'profiles' table update
  const { error: profileError } = await supabaseClient
    .from('profiles')
    .update({ 
      full_name: updateName, 
      company: updateCompany,
      information: updateInformation // Update new field
    })
    .eq('id', user.id); // Update the row where 'id' matches the user's ID

  if (authError || profileError) {
    updateMessage.textContent = (authError?.message || '') + (profileError?.message || '');
    updateMessage.classList.remove('warning', 'success');
    updateMessage.classList.add('error');
  } else {
    updateMessage.textContent = 'Profile updated successfully!';
    updateMessage.classList.remove('warning', 'error');
    updateMessage.classList.add('success');
    fetchUserData(user); 
  }
});

// Handle Sign Out
document.getElementById('signOutButton').addEventListener('click', async () => {
  const { error } = await supabaseClient.auth.signOut();
  if (!error) {
    window.location.href = 'login.html'; // Redirect to login after sign out
  } else {
    alert('Error signing out: ' + error.message);
  }
});

// IMPORTANT: Use onAuthStateChange to handle session changes
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
    if (session && session.user) {
      fetchUserData(session.user);
    } else {
      console.warn('Session found but no user object, redirecting to login.');
      window.location.href = 'login.html';
    }
  } else if (event === 'SIGNED_OUT') {
    window.location.href = 'login.html';
  } else if (event === 'INITIAL_SESSION') {
    if (session && session.user) {
      fetchUserData(session.user);
    } else {
      console.log('No active session on initial load, redirecting to login.');
      window.location.href = 'login.html';
    }
  }
});

// Hamburger menu (assuming this is present on your site-wide header)
const hamburger = document.getElementById("hamburger");
const navMenu = document.getElementById("navMenu");
if (hamburger && navMenu) {
  hamburger.addEventListener("click", () => {
    navMenu.classList.toggle("active");
  });
}
</script>
</body>
</html>
