
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Account</title>

    <!-- Link to your external stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Link to the Supabase JS library -->
    <script src="js/supabase.min.js"></script>
</head>
<body>

    <!-- This section is the loading screen -->
    <section class="hero" id="loading-section">
        <div class="hero-content">
            <h1 id="loading-message">Verifying Session...</h1>
        </div>
    </section>

    <!-- This is your main account content -->
    <!-- THE FIX: It is now hidden using style="display: none;" instead of a class -->
    <div id="account-content" style="padding: 40px 20px; display: none;">
        <div class="account-wrapper">
            <h2>Your Account Dashboard</h2>
            
            <div class="account-info">
                <p>Welcome! You are successfully logged in. Your user details are shown below.</p>
                <pre id="user-info"></pre>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                 <button id="signOutButton" class="btn btn-secondary">Sign Out</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://tirkqybcedxfusifslim.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8'
        );

        const accountContent = document.getElementById('account-content');
        const loadingSection = document.getElementById('loading-section'); // Get the loading section
        const userInfo = document.getElementById('user-info');
        const signOutButton = document.getElementById('signOutButton');

        signOutButton.addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signOut();
            if (error) {
                alert(`Sign out failed: ${error.message}`);
            } else {
                window.location.href = 'login.html';
            }
        });

        async function checkSession() {
            const { data, error } = await supabaseClient.auth.getSession();
            
            if (error) {
                window.location.href = 'login.html';
                return;
            }

            if (data.session) {
                // If the user is logged in:
                // 1. Hide the "Verifying..." loading section
                loadingSection.style.display = 'none';

                // 2. Show the main account content by changing its display style
                accountContent.style.display = 'block';

                // 3. Display the user data
                userInfo.textContent = JSON.stringify(data.session.user, null, 2);
            } else {
                // If user is NOT logged in, redirect to login page
                window.location.href = 'login.html';
            }
        }
        
        // Run the check as soon as the page loads
        checkSession();
    </script>

</body>
</html>
