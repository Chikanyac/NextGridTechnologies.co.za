<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create or Edit Invoice - NextGrid Technologies</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="create_invoice.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C9DS2C71G6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C9DS2C71G6');
    </script>
</head>
<body>
<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <a href="index.html" class="logo-text">NextGrid Technologies</a>
    </div>
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="blog.html">Blog</a>
      <div id="adminLinkContainer"></div>
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
  </div>
</header>

<div class="container">
    <h1>Create / Edit Invoice</h1>

    <!-- Toggle for create or edit -->
    <div class="form-group">
        <label>Do you want to edit an existing invoice?</label>
        <select id="editExistingToggle">
            <option value="no" selected>No (Create New Invoice)</option>
            <option value="yes">Yes (Edit Existing Invoice)</option>
        </select>
    </div>

    <!-- Client selection -->
    <div class="form-group">
        <label for="clientSelect">Select Client:</label>
        <select id="clientSelect" required>
            <option value="">-- Select a client --</option>
        </select>
        <input type="hidden" id="selectedUserId">
    </div>

    <!-- Existing invoice selection (only shown when edit) -->
    <div class="form-group" id="existingInvoiceContainer" style="display:none;">
        <label for="existingInvoiceSelect">Select Invoice to Edit:</label>
        <select id="existingInvoiceSelect"></select>
    </div>

    <div class="form-group"><label for="clientEmail">Client Email:</label><input type="email" id="clientEmail" readonly></div>
    <div class="form-group"><label for="clientAddress">Client Address:</label><input type="text" id="clientAddress" readonly></div>
    <div class="form-group"><label for="clientPhone">Client Phone:</label><input type="tel" id="clientPhone" readonly></div>

    <div class="form-group"><label for="invoiceNumber">Invoice Number:</label><input type="text" id="invoiceNumber" required></div>
    <div class="form-group"><label for="invoiceDate">Invoice Date:</label><input type="date" id="invoiceDate" required></div>
    <div class="form-group"><label for="issueDate">Issue Date:</label><input type="date" id="issueDate" required></div>
    <div class="form-group"><label for="dueDate">Due Date:</label><input type="date" id="dueDate" required></div>
    <div class="form-group">
        <label for="status">Status:</label>
        <select id="status" required>
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="paid">Paid</option>
            <option value="overdue">Overdue</option>
        </select>
    </div>
    <div class="form-group"><label for="paymentTerms">Payment Terms:</label><input type="text" id="paymentTerms" value="Net 15"></div>
    <div class="form-group"><label for="purchaseOrder">Purchase Order (Optional):</label><input type="text" id="purchaseOrder"></div>
    <div class="form-group"><label for="paymentInstructions">Payment Instructions:</label><textarea id="paymentInstructions" rows="4"></textarea></div>
    <div class="form-group"><label for="subtotal">Subtotal (calculated):</label><input type="number" id="subtotal" step="0.01" value="0.00" readonly></div>
    <div class="form-group"><label for="discountRate">Discount Rate (%):</label><input type="number" id="discountRate" step="0.01" value="0.00" min="0" max="100"></div>
    <div class="form-group"><label for="discountAmount">Discount Amount (R):</label><input type="number" id="discountAmount" step="0.01" value="0.00" readonly></div>
    <div class="form-group"><label for="vatRate">VAT Rate (%):</label><input type="number" id="vatRate" step="0.01" value="15.00" min="0" max="100"></div>
    <div class="form-group"><label for="vatAmount">VAT Amount (R):</label><input type="number" id="vatAmount" step="0.01" value="0.00" readonly></div>
    <div class="form-group"><label for="totalAmountDue">Total Amount Due (calculated):</label><input type="number" id="totalAmountDue" step="0.01" value="0.00" readonly></div>

    <h2>Line Items</h2>
    <div id="lineItemsContainer"></div>
    <button type="button" class="btn-primary add-line-item-btn" onclick="addLineItem()">Add Line Item</button>

    <div class="button-group">
        <button type="submit" class="btn-primary" id="submitInvoiceBtn">Save Invoice</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script src="js/supabase.min.js"></script>
<script>
const supabaseClient = supabase.createClient(
    'https://tirkqybcedxfusifslim.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8',
    { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
);

const invoiceForm = document.getElementById('invoiceForm');
const messageDiv = document.getElementById('message');
const lineItemsContainer = document.getElementById('lineItemsContainer');
let lineItemCount = 0;

const clientSelect = document.getElementById('clientSelect');
const existingInvoiceSelect = document.getElementById('existingInvoiceSelect');
const existingInvoiceContainer = document.getElementById('existingInvoiceContainer');
const selectedUserIdInput = document.getElementById('selectedUserId');

const clientEmailInput = document.getElementById('clientEmail');
const clientAddressInput = document.getElementById('clientAddress');
const clientPhoneInput = document.getElementById('clientPhone');

let allClientProfiles = [];
let currentEditingInvoice = null;

function showMessage(text, type) {
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    setTimeout(() => { messageDiv.textContent = ''; messageDiv.className = 'message'; }, 5000);
}

// =================== LINE ITEM LOGIC ===================
function addLineItem(data = {}) {
    const newItemId = lineItemCount++;
    const lineItemHtml = `
        <div class="line-item-section" data-item-id="${newItemId}">
            <div class="line-item-header"><h3>Line Item #${newItemId + 1}</h3><button type="button" class="remove-line-item-btn" onclick="removeLineItem(this)">Remove</button></div>
            <div class="line-item-fields">
                <div class="form-group"><label for="itemDescription_${newItemId}">Description:</label><input type="text" id="itemDescription_${newItemId}" value="${data.description||''}" required></div>
                <div class="form-group"><label for="itemQty_${newItemId}">Qty:</label><input type="number" id="itemQty_${newItemId}" step="0.01" value="${data.quantity||1}" min="0" oninput="calculateTotals()"></div>
                <div class="form-group"><label for="itemRate_${newItemId}">Rate (R):</label><input type="number" id="itemRate_${newItemId}" step="0.01" value="${data.rate||0.00}" min="0" oninput="calculateTotals()"></div>
                <div class="form-group"><label for="itemAmount_${newItemId}">Amount (R):</label><input type="number" id="itemAmount_${newItemId}" step="0.01" value="${data.amount||0.00}" readonly></div>
            </div>
        </div>`;
    lineItemsContainer.insertAdjacentHTML('beforeend', lineItemHtml);
    calculateTotals();
}

function removeLineItem(button) {
    const itemSection = button.closest('.line-item-section');
    if (lineItemsContainer.children.length > 1) {
        itemSection.remove();
        calculateTotals();
    } else {
        showMessage("Cannot remove the last line item.", "error");
    }
}

function calculateTotals() {
    let subtotal = 0;
    document.querySelectorAll('.line-item-section').forEach(section => {
        const itemId = section.dataset.itemId;
        const qty = parseFloat(document.getElementById(`itemQty_${itemId}`).value) || 0;
        const rate = parseFloat(document.getElementById(`itemRate_${itemId}`).value) || 0;
        const amountInput = document.getElementById(`itemAmount_${itemId}`);
        const itemAmount = qty * rate;
        amountInput.value = itemAmount.toFixed(2);
        subtotal += itemAmount;
    });
    document.getElementById('subtotal').value = subtotal.toFixed(2);
    const discountRate = parseFloat(document.getElementById('discountRate').value) || 0;
    const vatRate = parseFloat(document.getElementById('vatRate').value) || 0;
    const discountAmount = subtotal * (discountRate / 100);
    const subtotalAfterDiscount = subtotal - discountAmount;
    const vatAmount = subtotalAfterDiscount * (vatRate / 100);
    const totalAmountDue = subtotalAfterDiscount + vatAmount;
    document.getElementById('discountAmount').value = discountAmount.toFixed(2);
    document.getElementById('vatAmount').value = vatAmount.toFixed(2);
    document.getElementById('totalAmountDue').value = totalAmountDue.toFixed(2);
}

['discountRate','vatRate'].forEach(id => document.getElementById(id).addEventListener('input', calculateTotals));

// =================== CLIENT + INVOICE LOGIC ===================
async function fetchClientProfiles() {
    const { data, error } = await supabaseClient.from('profiles')
        .select('user_id, full_name, email, company, address, phone_number')
        .eq('role','client');
    if (error) { showMessage(`Error fetching clients: ${error.message}`, 'error'); return []; }
    return data;
}

function populateClients(clients) {
    clientSelect.innerHTML = '<option value="">-- Select a client --</option>';
    allClientProfiles = clients;
    clients.forEach(client => {
        const option = document.createElement('option');
        option.value = client.user_id;
        option.textContent = `${client.company || ''} - ${client.full_name || client.email}`;
        clientSelect.appendChild(option);
    });
}

function autofillClientDetails() {
    const selectedId = clientSelect.value;
    const client = allClientProfiles.find(c => c.user_id === selectedId);
    if(client){
        selectedUserIdInput.value = client.user_id;
        clientEmailInput.value = client.email||'';
        clientAddressInput.value = client.address||'';
        clientPhoneInput.value = client.phone_number||'';
        if(document.getElementById('editExistingToggle').value==='yes'){
            loadClientInvoices(client.user_id);
        }
    } else {
        selectedUserIdInput.value = '';
        clientEmailInput.value = '';
        clientAddressInput.value = '';
        clientPhoneInput.value = '';
        existingInvoiceContainer.style.display='none';
    }
}

clientSelect.addEventListener('change', autofillClientDetails);

// =================== EDIT TOGGLE ===================
document.getElementById('editExistingToggle').addEventListener('change', (e)=>{
    if(e.target.value==='yes'){
        if(clientSelect.value) loadClientInvoices(clientSelect.value);
    } else {
        existingInvoiceContainer.style.display='none';
        currentEditingInvoice=null;
        generateNextInvoiceNumber();
    }
});

// =================== SUPABASE INVOICE NUMBER ===================
async function generateNextInvoiceNumber() {
    const userId = clientSelect.value;
    if(!userId) return;
    const { data: lastInvoice } = await supabaseClient.from('invoices')
        .select('invoice_number')
        .eq('user_id',userId)
        .order('created_at',{ascending:false})
        .limit(1)
        .single();
    if(lastInvoice && lastInvoice.invoice_number){
        const parts = lastInvoice.invoice_number.split('-');
        let num = parseInt(parts[2]) +1;
        document.getElementById('invoiceNumber').value=`NGT-2026-${String(num).padStart(4,'0')}`;
    } else {
        document.getElementById('invoiceNumber').value='NGT-2026-0001';
    }
}

// =================== LOAD EXISTING INVOICES ===================
async function loadClientInvoices(userId){
    const { data: invoices } = await supabaseClient.from('invoices')
        .select('*')
        .eq('user_id', userId)
        .order('created_at',{ascending:false});
    existingInvoiceSelect.innerHTML='<option value="">-- Select an invoice --</option>';
    invoices.forEach(inv=>{
        const option=document.createElement('option');
        option.value=inv.id;
        option.textContent=`${inv.invoice_number} - ${inv.status}`;
        existingInvoiceSelect.appendChild(option);
    });
    existingInvoiceContainer.style.display='block';
}

// =================== POPULATE INVOICE DATA FOR EDIT ===================
existingInvoiceSelect.addEventListener('change', async ()=>{
    const invoiceId = existingInvoiceSelect.value;
    if(!invoiceId) return;
    const { data: inv } = await supabaseClient.from('invoices').select('*').eq('id',invoiceId).single();
    if(inv){
        currentEditingInvoice = inv.id;
        document.getElementById('invoiceNumber').value=inv.invoice_number;
        document.getElementById('invoiceDate').value=inv.invoice_date;
        document.getElementById('issueDate').value=inv.issue_date;
        document.getElementById('dueDate').value=inv.due_date;
        document.getElementById('status').value=inv.status;
        document.getElementById('paymentTerms').value=inv.payment_terms||'';
        document.getElementById('purchaseOrder').value=inv.purchase_order||'';
        document.getElementById('paymentInstructions').value=inv.payment_instructions||'';
        document.getElementById('discountRate').value=inv.discount_percentage||0;
        document.getElementById('vatRate').value=inv.vat_percentage||15;
        // Clear line items
        lineItemsContainer.innerHTML='';
        const { data: items } = await supabaseClient.from('invoice_items').select('*').eq('invoice_id', inv.id);
        if(items && items.length>0) items.forEach(item=>addLineItem(item));
        calculateTotals();
    }
});

// =================== FORM SUBMISSION ===================
invoiceForm.addEventListener('submit', async (e)=>{
    e.preventDefault();
    try{
        const invoiceData={
            user_id:selectedUserIdInput.value,
            invoice_number:document.getElementById('invoiceNumber').value,
            invoice_date:document.getElementById('invoiceDate').value,
            issue_date:document.getElementById('issueDate').value,
            due_date:document.getElementById('dueDate').value,
            status:document.getElementById('status').value,
            client_email:document.getElementById('clientEmail').value,
            client_phone:document.getElementById('clientPhone').value,
            subtotal:parseFloat(document.getElementById('subtotal').value),
            discount_amount:parseFloat(document.getElementById('discountAmount').value),
            vat_percentage:parseFloat(document.getElementById('vatRate').value),
            vat_amount:parseFloat(document.getElementById('vatAmount').value),
            total_amount_due:parseFloat(document.getElementById('totalAmountDue').value),
            payment_terms:document.getElementById('paymentTerms').value,
            purchase_order:document.getElementById('purchaseOrder').value||null,
            payment_instructions:document.getElementById('paymentInstructions').value,
            currency:'ZAR'
        };

        if(!invoiceData.user_id) throw new Error("Select a client first.");

        let savedInvoiceId=currentEditingInvoice;
        if(currentEditingInvoice){
            // Update existing invoice
            const { error } = await supabaseClient.from('invoices').update(invoiceData).eq('id', currentEditingInvoice);
            if(error) throw new Error(error.message);
        } else {
            // Create new invoice
            const { data:newInvoice, error } = await supabaseClient.from('invoices').insert(invoiceData).select('id').single();
            if(error) throw new Error(error.message);
            savedInvoiceId = newInvoice.id;
        }

        // Insert/Update line items
        const lineItemsData = Array.from(document.querySelectorAll('.line-item-section')).map(section=>{
            const itemId=section.dataset.itemId;
            return {
                invoice_id:savedInvoiceId,
                description:document.getElementById(`itemDescription_${itemId}`).value,
                quantity:parseFloat(document.getElementById(`itemQty_${itemId}`).value)||0,
                rate:parseFloat(document.getElementById(`itemRate_${itemId}`).value)||0,
                amount:parseFloat(document.getElementById(`itemAmount_${itemId}`).value)||0
            };
        });

        // Delete existing items if editing
        if(currentEditingInvoice){
            await supabaseClient.from('invoice_items').delete().eq('invoice_id',savedInvoiceId);
        }

        await supabaseClient.from('invoice_items').insert(lineItemsData);
        showMessage('Invoice saved successfully!', 'success');
        invoiceForm.reset();
        lineItemsContainer.innerHTML='';
        addLineItem();
        generateNextInvoiceNumber();
        existingInvoiceContainer.style.display='none';
    }catch(err){
        showMessage(err.message,'error');
    }
});

// =================== LOGIN / LOGOUT ===================
const loginLogoutLink = document.getElementById('loginLogoutLink');
const adminLinkContainer = document.getElementById('adminLinkContainer');

async function checkAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if(session){
        loginLogoutLink.textContent='Logout';
        loginLogoutLink.href='#';
        loginLogoutLink.onclick = async (e)=>{
            e.preventDefault();
            await supabaseClient.auth.signOut();
            location.reload();
        };
        // Check if admin
        const { data:userProfile } = await supabaseClient.from('profiles').select('role').eq('user_id',session.user.id).single();
        if(userProfile && userProfile.role==='admin'){
            adminLinkContainer.innerHTML='<a href="admin_panel.html">Admin Panel</a>';
        }
    } else {
        loginLogoutLink.textContent='Client Login';
        loginLogoutLink.href='login.html';
        adminLinkContainer.innerHTML='';
    }
}

document.addEventListener('DOMContentLoaded', async ()=>{
    checkAuth();
    addLineItem();
    const clients = await fetchClientProfiles();
    populateClients(clients);
    generateNextInvoiceNumber();
});
</script>
</body>
</html>
