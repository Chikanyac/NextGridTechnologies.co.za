<body>

<!-- ====================HEADER========================== -->
<header>
  <div class="container header-flex">
    <div class="logo-area">
      <img src="favicon.ico" alt="NextGrid Technologies Logo" class="logo">
      <!-- Changed span to an anchor to make the logo clickable to home -->
      <a href="index.html" class="logo-text">NextGrid Technologies</a>

    <nav id="navMenu">
      <a href="index.html">Home</a>

      <!-- Placeholder for admin link - will be populated by JS if user is admin -->
      <div id="adminLinkContainer"></div>
      <!-- Login/Logout Link - ID for JS to target -->
      <!-- This will be "Client Login" or "Logout" based on auth status -->
      <a href="login.html" class="nav-cta" id="loginLogoutLink">Client Login</a>

    <div class="header-contact">

<!-- Adjusted margin-top for the login section to account for the header -->
<section id="login" class="contact-wrapper" style="max-width:420px;margin:30px auto;text-align:center; padding-top: 20px;">
  <h2>Client Login</h2>
  <p class="contact-subtext">Access your account</p>

  <form id="loginForm" class="contact-form">
    <input type="email" id="email" placeholder="Business Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <!-- Forgot Password Link -->
    <div class="form-actions">
      <a href="#" id="forgotPasswordLink" class="forgot-password-link">Forgot password?</a>
    </div>

    <button type="submit" class="btn-primary">Sign In</button>
    <p id="message" class="message-text"></p> <!-- Now using the .message-text class -->

    <p style="margin-top:10px;font-size:14px;">
      Don’t have an account? <a href="index.html#contact">Request access</a>
    </p>
  </form>
</section>

    <script src="js/supabase.min.js"></script>
    <script>
        // Initialize Supabase Client
        const supabaseClient = supabase.createClient(
            'https://tirkqybcedxfusifslim.supabase.co', // <-- REPLACE WITH YOUR SUPABASE URL
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpcmtxeWJjZWR4ZnVzaWZzbGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjA4NDcsImV4cCI6MjA5MDQzNjg0N30.EQufAux8VmjAzDeIj8MrmqXaIDBfsCpbj2FUS60e5-8', // <-- REPLACE WITH YOUR SUPABASE ANON KEY
            { auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true } }
        );

        const loginForm = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.textContent = '';
                messageDiv.className = 'message';
            }, 5000);
        }

        async function signInUser(email, password) {
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    throw error;
                }

                // Fetch user's profile to get their role
                const { data: profileData, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id) // Use the ID from the logged-in user
                    .single(); // Expect only one profile

                if (profileError) {
                    console.error('Error fetching user role:', profileError.message);
                    // Even if role fetch fails, we might still want to let them into a default client dashboard
                    window.location.href = 'client_dashboard.html'; // Default safe redirection
                    return;
                }

                if (profileData && profileData.role === 'admin') {
                    window.location.href = 'admin_dashboard.html';
                } else {
                    // Default to client dashboard for regular users or if role is not found/admin
                    window.location.href = 'client_dashboard.html';
                }

            } catch (error) {
                console.error('Login error:', error.message);
                showMessage(`Login failed: ${error.message}`, 'error');
            }
        }

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                await signInUser(email, password);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // Dynamic Navigation Link Display (for the header)
            const adminLinkContainer = document.getElementById('adminLinkContainer');
            const loginLogoutLink = document.getElementById('loginLogoutLink');

            // On the login page, we specifically check if a user is *already* logged in.
            // If they are, we should probably redirect them away from the login page.
            const { data: { user }, error } = await supabaseClient.auth.getUser();

            if (user) {
                // If user is already logged in, fetch their role and redirect them
                const { data: profileData, error: profileError } = await supabaseClient
                   .from('profiles')
                   .select('role')
                  .eq('id::uuid', user.id) // Explicitly cast 'id' to uuid for the filter
                   .single();

                if (!profileError && profileData) {
                    if (profileData.role === 'admin') {
                        window.location.href = 'admin_dashboard.html';
                    } else {
                        window.location.href = 'client_dashboard.html';
                    }
                } else {
                    window.location.href = 'client_dashboard.html'; // Default if role fetch fails
                }
                return; // Stop further execution on login page if already logged in
            } else {
                // User is NOT logged in. Ensure login link is visible and admin link is hidden.
                loginLogoutLink.textContent = 'Client Login';
                loginLogoutLink.href = 'login.html'; // It's already login.html, but ensures consistency
                adminLinkContainer.innerHTML = ''; // Hide admin link
            }

            // Hamburger menu functionality
            const hamburger = document.getElementById("hamburger");
            const navMenu = document.getElementById("navMenu");
            if (hamburger && navMenu) {
                hamburger.addEventListener("click", () => {
                    navMenu.classList.toggle("active");
                });
            }
        });
    </script>
</body>
</html>
