<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | NextGrid Technologies</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <div class="container header-flex">
    <h1>NextGrid Technologies</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
    </nav>
  </div>
</header>

<section class="section">
  <div class="container">

    <h2>Get Your Free Security Check</h2>
    <p>Fill in the form below and one of our specialists will contact you.</p>

    <!-- =========================
         FORM START
    ========================= -->
    <form action="https://formspree.io/f/maqdkqyg" method="POST" class="contact-form">

      <!-- Redirect AFTER submit -->
      <input type="hidden" name="_next" value="https://nextgridtechnologies.co.za/thank-you.html">

      <!-- Optional: Email subject -->
      <input type="hidden" name="_subject" value="New Security Request - Website">

      <!-- Name -->
      <input type="text" name="name" placeholder="Your Name" required>

      <!-- Email -->
      <input type="email" name="email" placeholder="Your Email" required>

      <!-- Company -->
      <input type="text" name="company" placeholder="Company Name">

      <!-- Message -->
      <textarea name="message" placeholder="Tell us about your IT environment..." required></textarea>

      <!-- Submit -->
      <button type="submit">Request Free Check</button>

    </form>
    
    <p style="margin-top:15px;">
    Or chat with us directly:
    <a href="https://wa.me/27680330794" target="_blank">💬 WhatsApp</a>
    </p>
    
    <!-- =========================
         FORM END
    ========================= -->

  </div>
</section>

<footer>
  <div class="container">
    <p>© 2026 NextGrid Technologies | Microsoft 365 Security Specialists</p>
  </div>
</footer>

</body>
</html>
